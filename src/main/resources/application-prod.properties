# ============================================================
# Production profile — PostgreSQL via environment variables
# ============================================================
# Activate with:  SPRING_PROFILES_ACTIVE=prod
# Or with Docker: -e SPRING_PROFILES_ACTIVE=prod
#
# Every sensitive value is read from the environment so that
# credentials are NEVER committed to source control.
# Required environment variables:
#   DB_HOST      — hostname of the PostgreSQL server
#   DB_PORT      — port (usually 5432)
#   DB_NAME      — database name
#   DB_USERNAME  — database user
#   DB_PASSWORD  — database password
# ============================================================

# ── DataSource ───────────────────────────────────────────────────────────────
# The ?currentSchema= param is omitted intentionally: the DB_USERNAME schema
# is used by default in PostgreSQL.  Add it if your schema differs from the user.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool ─────────────────────────────────────────────────
# Spring Boot auto-configures HikariCP when it is on the classpath.
# These values are conservative defaults appropriate for a single-instance app;
# increase maximum-pool-size if load testing reveals connection contention.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Pool name appears in JMX and thread-dump stack traces — makes it easy to spot.
spring.datasource.hikari.pool-name=portfolio-prod-pool

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# 'validate': Hibernate checks that the DB schema matches the entity model on
# startup and throws if there is a mismatch.  It never alters the schema.
# Use a migration tool (Flyway or Liquibase) to evolve the schema in production.
#
# WHY NOT 'update' in prod?
#   'update' is convenient in dev but dangerous in production: it silently
#   issues ALTER TABLE statements that can lose data (e.g. column rename is
#   modelled as DROP + ADD, destroying the data in that column).
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL dialect is auto-detected by Hibernate 6; this line makes it explicit
# and guards against auto-detection failing with unusual JDBC driver versions.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable SQL logging in production — it is verbose and a potential data leak.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Keep open-in-view disabled (same as dev) — no change needed since it is
# already set to false in the base application.properties.
# spring.jpa.open-in-view=false  ← inherited from application.properties

# ── H2 console ───────────────────────────────────────────────────────────────
# Explicitly disabled in production.  The base file enables it for dev;
# this override ensures it is never accidentally exposed on a prod server.
spring.h2.console.enabled=false

