spring.application.name=portfolio-tracker

# Active profile — controls which @Profile beans are loaded.
# Change to 'prod' (or set via env var SPRING_PROFILES_ACTIVE=prod) for PostgreSQL.
spring.profiles.active=dev

# ── H2 in-memory datasource (dev only) ──────────────────────────────────────
# DB_CLOSE_DELAY=-1  keeps the in-memory DB alive for the full JVM lifetime so the
# H2 console (which opens a second connection) can still reach it.
# Without this H2 2.x drops the schema the moment the Spring connection pool
# releases its last connection — the console then sees "database not found".
spring.datasource.url=jdbc:h2:mem:portfolio;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# create-drop: schema is created on startup and dropped on shutdown — safe for
# the in-memory dev database; switch to 'validate' or 'none' against PostgreSQL.
spring.jpa.hibernate.ddl-auto=create-drop
# Format SQL in logs so multi-line queries are readable during development.
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
# Disable Open-Session-In-View: keeping a DB connection open across the full
# HTTP request masks LazyInitializationExceptions and wastes connections in prod.
spring.jpa.open-in-view=false

# ── H2 web console (reachable at http://localhost:8080/h2-console) ───────────
spring.h2.console.enabled=true

